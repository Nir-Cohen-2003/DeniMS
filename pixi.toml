[workspace]
authors = ["Nir <<>>"]
channels = ["https://prefix.dev/conda-forge","https://prefix.dev/nir-cohen"]
name = "DeniMS"
platforms = ["linux-64"]
version = "0.1.0"

[system-requirements]
cuda = "12.9"

[feature.gpu.tasks]
# Data preparation -------------------------------------------------------------
# Example:
#   pixi run prep-data -input_parquet Preprocessing/fraghub/fraghub.parquet \
#                      -generate_graph_dict -split_type random
prep-data = "python Preprocessing/data_processing.py"

# Generate a PyTorch-Geometric graph dictionary from a filtered parquet file.
# Example:
#   pixi run graph-dict -input_parquet Preprocessing/fraghub/fraghub_filtered.parquet \
#                       -output_dict Preprocessing/fraghub/smiles_dict_fraghub.pt
graph-dict = "python Preprocessing/generate_graph_dict.py"

# End-to-end training-data preparation (cross-environment shell chain) ----------
# Step 1 (data-prep env): convert a raw spectral library (MSP/MGF/MSPEC) into a
#   DeniMS training parquet via converters/build_training_parquet.py.
# Step 2 (gpu env): filter that parquet and build the graph dict + splits via
#   Preprocessing/data_processing.py (the `prep-data` task).
# The intermediate parquet path is shared between the two steps so their I/O
# matches. Override the input library with the DENIMS_LIB_INPUT env var:
#   DENIMS_LIB_INPUT=path/to/library.msp pixi run prepare-training
# Native pixi `depends-on` cannot be used here because hrms_utils requires
# python>=3.12 (data-prep env) while the GPU stack is pinned to python 3.10
# (gpu env), and `depends-on` only works within a single environment.
prepare-training = { cmd = "pixi run -e data-prep convert-training ${DENIMS_LIB_INPUT:-Preprocessing/fraghub/library.msp} -o Preprocessing/fraghub/fraghub_denims_training.parquet && pixi run -e gpu prep-data -input_parquet Preprocessing/fraghub/fraghub_denims_training.parquet -generate_graph_dict -split_type random" }

# Stage 1: Spectrum encoder pretraining -----------------------------------------
# Example:
#   pixi run train-encoder -mode contrastive \
#       -data_path Preprocessing/fraghub/fraghub_filtered.parquet \
#       -smiles_path Preprocessing/fraghub/smiles_dict_fraghub.pt \
#       -split_path Preprocessing/fraghub/splits_fraghub_random.pkl \
#       -trainable_temperature -comment "contrastive_fraghub"
train-encoder = "python train.py"

# Evaluate a trained spectrum encoder.
# Example:
#   pixi run eval-encoder -cp_name [cp_name] -mode contrastive \
#       -data_path Preprocessing/fraghub/fraghub_filtered.parquet \
#       -smiles_path Preprocessing/fraghub/smiles_dict_fraghub.pt \
#       -split_path Preprocessing/fraghub/splits_fraghub_random.pkl \
#       -total_samples 512
eval-encoder = "python run_evaluation.py"

# Stage 2: Graph2Mol diffusion pretraining (no MS conditioning) ----------------
# Example:
#   pixi run pretrain-diffusion \
#       conditioning.embeddings_type=mol2emb \
#       conditioning.embedding_model_path=[contrastive_cp_path] \
#       train.finetune_ms_encoder=False
pretrain-diffusion = { cmd = "python main.py", cwd = "MS_diffusion/src" }

# Stage 3a: MS2Mol finetuning (MS-conditioned diffusion) -----------------------
# Example:
#   pixi run finetune-diffusion \
#       conditioning.embeddings_type=ms2emb \
#       conditioning.embedding_model_path=[contrastive_cp_path] \
#       general.resume=[graph2mol_cp_path] \
#       train.finetune_ms_encoder=True \
#       train.lr=0.0001
finetune-diffusion = { cmd = "python main.py", cwd = "MS_diffusion/src" }

# Stage 3b: MS2Mol test-set inference ------------------------------------------
# Example:
#   pixi run test-inference \
#       conditioning.embeddings_type=ms2emb \
#       conditioning.embedding_model_path=[contrastive_cp_path] \
#       general.test_only=[ms2mol_cp_path] \
#       general.samples_to_generate='all' \
#       train.finetune_ms_encoder=True
test-inference = { cmd = "python main.py", cwd = "MS_diffusion/src" }

# Apply the trained MS2Mol model to experimental data --------------------------
# Example:
#   pixi run apply-model \
#       --model_checkpoint [path_to_model_ckpt.ckpt] \
#       --experimental_parquet ../../Preprocessing/experimental/experimental.parquet \
#       --output_dir ./inference_results \
#       --num_repeats 50
apply-model = { cmd = "python apply_model.py", cwd = "MS_diffusion/src" }

# End-to-end inference (cross-environment shell chain) --------------------------
# Step 1 (data-prep env): convert mzML file(s) into a DeniMS inference parquet
#   via converters/build_inference_parquet.py.
# Step 2 (gpu env): run the trained MS2Mol model on that parquet (the
#   `apply-model` task).
# The intermediate parquet is fixed at the path `apply-model` expects (relative
# to its cwd MS_diffusion/src). Override the mzML input with DENIMS_MZML_INPUT:
#   DENIMS_MZML_INPUT=path/to/run.mzML pixi run prepare-inference
# Extra args are appended to `apply-model`, e.g.:
#   pixi run prepare-inference --model_checkpoint [ckpt.ckpt] --num_repeats 50
# See `prepare-training` above for why native `depends-on` is not used.
prepare-inference = { cmd = "pixi run -e data-prep convert-inference ${DENIMS_MZML_INPUT:-Preprocessing/experimental/run.mzML} -o Preprocessing/experimental/experimental.parquet && pixi run -e gpu apply-model --experimental_parquet ../../Preprocessing/experimental/experimental.parquet --output_dir ./inference_results" }

# Stage 3c: Post-analysis notebook ---------------------------------------------
post-analysis = { cmd = "jupyter notebook post_analysis.ipynb", cwd = "MS_diffusion" }

# End-to-end smoke test --------------------------------------------------------
# Build a tiny dataset (1000 train + 100 test spectra) for fast pipeline testing.
# Requires Preprocessing/fraghub/fraghub.parquet (or fraghub_filtered.parquet)
# to be present; if neither exists, prints a clear error pointing at Zenodo
# record 19060052.
test-prepare-data = "python tests/e2e/prepare_tiny_data.py"

# Run the full MS2Mol training pipeline (encoder -> graph2mol -> ms2mol ->
# inference) on the tiny dataset. Uses small models and 2 epochs, so it is not
# scientifically meaningful, but validates that every stage runs end-to-end.
test-e2e = "python tests/e2e/run_e2e_test.py"

[feature.gpu.dependencies]
python = "3.10.*"
pytorch-gpu = ">=2.5.1"
rdkit = "*"
graph-tool = "*"
ftfy = "*"
packaging = "*"
regex = "*"
tqdm = "*"
numpy = "==1.26.4"
matplotlib = "*"
pandas = "*"
opencv = "*"
wandb = "*"
pyarrow = "*"
hydra-core = "==1.3.2"
omegaconf = "==2.3.0"
opentsne = "*"
pytorch-lightning = "==2.0.4"
pulp = ">=2.7.0"
python-lmdb = "*"
jupyter = "*"
[feature.gpu.pypi-dependencies]
torch-geometric = "==2.3.1"
albumentations = "==1.4.2"
myopic-mces = "==1.1.1"

[environments]
gpu = {features = ["gpu"], solve-group = "gpu"}
data-prep = {features = ["data-prep"], solve-group = "data-prep"}

[feature.data-prep.tasks]
# Converters: raw MS data -> DeniMS parquet (see converters/README.md and
# DATA_FORMATS.md). These run in the data-prep env (python 3.12 + hrms_utils).

# Convert a raw spectral library (MSP/MGF/MSPEC, with SMILES/InChI) into a
# DeniMS training parquet (DATA_FORMATS.md §2 schema).
# Example:
#   pixi run -e data-prep convert-training path/to/library.msp \
#       -o Preprocessing/fraghub/fraghub_denims_training.parquet
convert-training = "python converters/build_training_parquet.py"

# Convert mzML file(s) into a DeniMS inference parquet (DATA_FORMATS.md §3 schema).
# Example:
#   pixi run -e data-prep convert-inference path/to/run.mzML \
#       -o Preprocessing/experimental/experimental.parquet
convert-inference = "python converters/build_inference_parquet.py"

[feature.data-prep.dependencies]
python = "3.12.*"
hrms_utils = "==0.10.0"
# Direct imports of the converters (also pulled transitively by hrms_utils):
polars = "*"
rdkit = "*"
